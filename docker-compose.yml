services:
  queryfuser:
    image: us-docker.pkg.dev/rundownbi/queryfuser/queryfuser:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"   # Dashboard (web UI + API)
      - "5433:5433"   # PostgreSQL proxy (point your BI tool here)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
